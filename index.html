<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和風數位時鐘 - 勵志篇</title>
    <style>
        :root {
            --bg-color: #f8f4ed;
            --accent-color: #e57d90; /* 櫻色 */
            --text-color: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.75);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang TC", "Microsoft JhengHei", "Yu Gothic", sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                              url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .container {
            text-align: center;
            background: var(--glass-bg);
            padding: 2.5rem 4rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            width: 80%;
            max-width: 600px;
        }

        .location {
            font-size: 1rem;
            color: var(--text-color);
            letter-spacing: 0.3rem;
            opacity: 0.8;
        }

        .decoration {
            width: 40px;
            height: 1px;
            background-color: var(--accent-color);
            margin: 15px auto;
        }

        .clock {
            font-size: 4.5rem;
            font-weight: 300;
            color: var(--text-color);
            margin: 10px 0;
            display: flex;
            justify-content: center;
            align-items: baseline;
        }

        .seconds {
            font-size: 1.8rem;
            color: var(--accent-color);
            margin-left: 10px;
            width: 50px;
            text-align: left;
        }

        .date {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 25px;
        }

        /* 金句區域樣式 */
        .quote-container {
            border-top: 1px dashed #ccc;
            padding-top: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.5s ease-in-out;
        }

        .quote-jp {
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .quote-zh {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
        }

        /* 淡入淡出動畫 */
        .fade-out { opacity: 0; }
        .fade-in { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="location">富士山 · 山中湖</div>
        <div class="decoration"></div>
        
        <div class="clock">
            <span id="hours-mins">00:00</span>
            <span class="seconds" id="seconds">00</span>
        </div>
        
        <div class="date" id="date">2026年 3月 19日</div>

        <div class="quote-container" id="quote-area">
            <div class="quote-jp" id="quote-jp">...</div>
            <div class="quote-zh" id="quote-zh">...</div>
        </div>
    </div>

    <script>
        // 1. 金句資料庫
        const quotes = [
            { jp: "明日は明日の風が吹く。", zh: "明天將吹明天的風。（順其自然，總有出路）" },
            { jp: "七転び八起き。", zh: "跌倒七次，爬起來八次。（百折不撓）" },
            { jp: "一期一会。", zh: "一生只有一次的相遇。（珍惜當下）" },
            { jp: "継続は力なり。", zh: "持續就是力量。（貴在堅持）" },
            { jp: "初心忘るべからず。", zh: "莫忘初衷。" }
        ];

        // 2. 時鐘功能
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('hours-mins').textContent = `${hours}:${minutes}`;
            document.getElementById('seconds').textContent = seconds;
            
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-TW', options);
        }

        // 3. 隨機金句功能
        let lastIndex = -1;
        function updateQuote() {
            const quoteArea = document.getElementById('quote-area');
            
            // 先淡出
            quoteArea.classList.add('fade-out');

            setTimeout(() => {
                let randomIndex;
                // 確保不會抽到跟上次一樣的
                do {
                    randomIndex = Math.floor(Math.random() * quotes.length);
                } while (randomIndex === lastIndex);
                
                lastIndex = randomIndex;
                const quote = quotes[randomIndex];

                document.getElementById('quote-jp').textContent = quote.jp;
                document.getElementById('quote-zh').textContent = quote.zh;

                // 再淡入
                quoteArea.classList.remove('fade-out');
            }, 500);
        }

        // 初始化
        setInterval(updateClock, 1000);
        setInterval(updateQuote, 5000); // 每5秒切換
        
        updateClock();
        updateQuote();
    </script>
</body>
</html>
